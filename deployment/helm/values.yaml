# =============================================================================
# Investment Auto Helm Values
# 포트폴리오 자동 리밸런싱 시스템 배포 설정
# =============================================================================

# -----------------------------------------------------------------------------
# 글로벌 설정
# -----------------------------------------------------------------------------
global:
  namespace: investment-auto

# -----------------------------------------------------------------------------
# 애플리케이션 설정
# -----------------------------------------------------------------------------
app:
  name: investment-auto
  replicaCount: 1
  
  image:
    repository: ghcr.io/yourusername/investment-auto
    tag: latest
    pullPolicy: Always
  
  # 실행 모드: once, schedule
  mode: schedule
  
  # 스케줄러 체크 간격 (초)
  interval: 60
  
  # 환경: demo (모의투자), real (실전투자)
  environment: demo
  
  # 웹 서버 설정
  web:
    enabled: true
    port: 5000
  
  # 데이터베이스 모드 활성화
  dbMode: true
  
  # 리소스 설정
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # 라이브니스/레디니스 프로브
  livenessProbe:
    enabled: true
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    path: /api/health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -----------------------------------------------------------------------------
# 서비스 설정
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 5000

# -----------------------------------------------------------------------------
# Ingress 설정
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: investment.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: investment-auto-tls
      hosts:
        - investment.yourdomain.com

# -----------------------------------------------------------------------------
# PostgreSQL 설정 (Bitnami Helm Chart)
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  
  auth:
    username: appuser
    password: ""  # Secret에서 관리
    database: appdb
    existingSecret: investment-auto-db-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""  # 클러스터 기본 storageClass 사용
    
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  
  # 서비스 설정
  service:
    type: ClusterIP
    port: 5432

# -----------------------------------------------------------------------------
# 커스텀 PostgreSQL (Zalando Operator 사용 시)
# postgresql.enabled: false로 설정하고 이 섹션 사용
# -----------------------------------------------------------------------------
zalandoPostgresql:
  enabled: false
  teamId: acid
  numberOfInstances: 1
  volume:
    size: 5Gi
  users:
    appuser: []
  databases:
    appdb: appuser
  version: "16"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# -----------------------------------------------------------------------------
# ConfigMap 설정
# -----------------------------------------------------------------------------
config:
  # KIS API 설정 (Secret에서 관리하므로 여기선 기타 설정만)
  scheduler:
    checkInterval: 60
    retryCount: 3
    retryDelay: 5
  
  database:
    host: ""  # 자동 설정됨
    port: 5432
    name: appdb
    user: appuser
    sslmode: prefer
    connectTimeout: 5
    retryMax: 3
    retryBackoff: 0.5

# -----------------------------------------------------------------------------
# Secret 설정
# -----------------------------------------------------------------------------
secrets:
  # KIS API 키 (base64 인코딩 필요)
  kis:
    appKey: ""
    appSecret: ""
  
  # Upbit API 키 (선택)
  upbit:
    accessKey: ""
    secretKey: ""
  
  # 데이터베이스 비밀번호
  database:
    password: ""
    postgresPassword: ""

# -----------------------------------------------------------------------------
# ServiceAccount 설정
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Pod 설정
# -----------------------------------------------------------------------------
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# 환경변수 추가 설정
# -----------------------------------------------------------------------------
extraEnvVars: []
# - name: EXTRA_VAR
#   value: "value"

# -----------------------------------------------------------------------------
# Volumes 추가 설정
# -----------------------------------------------------------------------------
extraVolumes: []
extraVolumeMounts: []
