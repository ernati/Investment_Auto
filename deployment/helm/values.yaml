# =============================================================================
# Investment Auto Helm Values
# 포트폴리오 자동 리밸런싱 시스템 배포 설정
# =============================================================================

# -----------------------------------------------------------------------------
# 글로벌 설정
# -----------------------------------------------------------------------------
global:
  namespace: investment-auto

# -----------------------------------------------------------------------------
# 애플리케이션 설정
# -----------------------------------------------------------------------------
app:
  name: investment-auto
  replicaCount: 1
  
  # Python 공식 이미지 사용 (Docker 빌드 불필요)
  image:
    repository: python
    tag: "3.11-slim"
    pullPolicy: IfNotPresent
  
  # Git 저장소 설정 (initContainer에서 clone)
  git:
    repository: https://github.com/ernati/Investment_Auto.git
    branch: main
  
  # 호스트 Config 폴더 마운트 설정
  # 운영 서버의 Config 폴더를 Pod에 마운트
  hostConfig:
    path: /home/ernati/Services/Investment_Auto/Config
  
  # 호스트 demo_data 폴더 마운트 설정 (현금/포지션 파일)
  hostDemoData:
    path: /home/ernati/Services/Investment_Auto/Scripts/modules/demo_data
  
  # 실행 모드: once, schedule
  mode: schedule
  
  # 스케줄러 체크 간격 (초)
  interval: 60
  
  # 환경: demo (모의투자), real (실전투자)
  environment: demo
  
  # 웹 서버 설정
  web:
    enabled: true
    port: 5000
  
  # 데이터베이스 모드 활성화
  dbMode: true
  
  # 리소스 설정
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # 라이브니스/레디니스 프로브
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -----------------------------------------------------------------------------
# 서비스 설정
# -----------------------------------------------------------------------------
service:
  type: NodePort        # ClusterIP → NodePort (외부 접근 허용)
  port: 80
  targetPort: 5000
  nodePort: 30500       # 외부에서 http://<노드IP>:30500 으로 접근

# -----------------------------------------------------------------------------
# Ingress 설정
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: investment.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: investment-auto-tls
      hosts:
        - investment.yourdomain.com

# -----------------------------------------------------------------------------
# PostgreSQL 설정
# -----------------------------------------------------------------------------
# Bitnami Helm Chart 사용 (비활성화 - 이미지 태그 관리 어려움)
postgresql:
  enabled: false

# 공식 PostgreSQL 이미지 사용 (권장)
# 주의: 아래 auth 값은 Config/database.json과 반드시 일치해야 합니다.
#       PostgreSQL 컨테이너 초기화 시 환경변수가 필수이므로 중복이 불가피합니다.
officialPostgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"  # 공식 Docker Hub 이미지, 안정적
  auth:
    # Config/database.json과 동일하게 설정
    username: appuser          # database.json의 "user"
    database: appdb            # database.json의 "name"
    password: "temp1234"       # database.json의 "password"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 5432

# -----------------------------------------------------------------------------
# ConfigMap 설정 (스케줄러 설정만 - DB 설정은 Config/database.json에서 로드)
# -----------------------------------------------------------------------------
config:
  scheduler:
    checkInterval: 60
    retryCount: 3
    retryDelay: 5

# -----------------------------------------------------------------------------
# Secret 설정 (불필요 - Config 폴더에서 설정 로드)
# -----------------------------------------------------------------------------
# Config 폴더의 config.json, database.json 등에서 모든 설정을 로드하므로
# Kubernetes Secret은 사용하지 않습니다.
secrets:
  enabled: false

# -----------------------------------------------------------------------------
# ServiceAccount 설정
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -----------------------------------------------------------------------------
# Pod 설정
# -----------------------------------------------------------------------------
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# 이미지 Pull Secret (private registry 사용 시에만 설정)
# Python 공식 이미지 사용 시 불필요
# -----------------------------------------------------------------------------
imagePullSecrets: []
# - name: my-registry-secret

# -----------------------------------------------------------------------------
# 환경변수 추가 설정
# -----------------------------------------------------------------------------
extraEnvVars: []
# - name: EXTRA_VAR
#   value: "value"

# -----------------------------------------------------------------------------
# Volumes 추가 설정
# -----------------------------------------------------------------------------
extraVolumes: []
extraVolumeMounts: []

# -----------------------------------------------------------------------------
# 배포 트리거용 타임스탬프 (CI에서 자동 업데이트)
# 코드 변경 시 GitHub Actions가 이 값을 갱신하여 ArgoCD 재배포를 트리거합니다.
# -----------------------------------------------------------------------------
deployTimestamp: "2026-05-03T16:56:27Z"
