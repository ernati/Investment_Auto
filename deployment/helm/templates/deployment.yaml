apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "investment-auto.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "investment-auto.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "investment-auto.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "investment-auto.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "investment-auto.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      # Git clone + 의존성 설치를 위한 initContainer
      initContainers:
        - name: git-clone
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "📦 Installing git..."
              apt-get update && apt-get install -y --no-install-recommends git libpq-dev gcc
              
              echo "📥 Cloning repository..."
              git clone --depth 1 --branch {{ .Values.app.git.branch }} {{ .Values.app.git.repository }} /app
              
              echo "📚 Installing Python dependencies to /app/libs..."
              pip install --no-cache-dir --target=/app/libs -r /app/requirements.txt
              pip install --no-cache-dir --target=/app/libs psycopg2-binary pyjwt
              
              echo "✅ Initialization complete!"
          volumeMounts:
            - name: app-code
              mountPath: /app
            - name: pip-cache
              mountPath: /root/.cache/pip
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          workingDir: /app
          command: ["python"]
          args:
            - Scripts/apps/portfolio_rebalancing.py
            - --mode={{ .Values.app.mode }}
            - --interval={{ .Values.app.interval }}
            {{- if eq .Values.app.environment "demo" }}
            - --demo
            {{- end }}
            {{- if not .Values.app.web.enabled }}
            - --disable-web
            {{- end }}
            - --web-port={{ .Values.app.web.port }}
            {{- if .Values.app.dbMode }}
            - --db-mode
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.web.port }}
              protocol: TCP
          env:
            # Python 패키지 경로 (initContainer에서 /app/libs에 설치)
            - name: PYTHONPATH
              value: "/app/libs:/app/Scripts"
            # Pod 정보
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: app-code
              mountPath: /app
            - name: host-config
              mountPath: /app/Config
              readOnly: true
            - name: host-demo-data
              mountPath: /app/Scripts/modules/demo_data
              readOnly: false
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.app.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.app.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.app.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.app.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.app.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.app.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.app.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.app.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      
      volumes:
        - name: app-code
          emptyDir: {}
        - name: pip-cache
          emptyDir: {}
        - name: host-config
          hostPath:
            path: {{ .Values.app.hostConfig.path }}
            type: Directory
        - name: host-demo-data
          hostPath:
            path: {{ .Values.app.hostDemoData.path }}
            type: DirectoryOrCreate
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
