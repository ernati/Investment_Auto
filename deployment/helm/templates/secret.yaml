{{- /*
  Secret 설정은 더 이상 사용되지 않습니다.
  모든 설정은 호스트의 Config 폴더에서 마운트합니다:
  - /home/ernati/Services/Investment_Auto/Config/config.json
  - /home/ernati/Services/Investment_Auto/Config/database.json
  
  PostgreSQL 비밀번호는 values.yaml의 officialPostgresql.auth.password에서 직접 설정합니다.
*/ -}}
{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "investment-auto.fullname" . }}-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "investment-auto.labels" . | nindent 4 }}
type: Opaque
data: {}
{{- end }}
