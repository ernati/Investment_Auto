apiVersion: v1
kind: Secret
metadata:
  name: {{ include "investment-auto.kisSecretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "investment-auto.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.kis.appKey }}
  KIS_APP_KEY: {{ .Values.secrets.kis.appKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.kis.appSecret }}
  KIS_APP_SECRET: {{ .Values.secrets.kis.appSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.upbit.accessKey }}
  UPBIT_ACCESS_KEY: {{ .Values.secrets.upbit.accessKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.upbit.secretKey }}
  UPBIT_SECRET_KEY: {{ .Values.secrets.upbit.secretKey | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "investment-auto.databaseSecretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "investment-auto.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.database.password }}
  password: {{ .Values.secrets.database.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.database.postgresPassword }}
  postgres-password: {{ .Values.secrets.database.postgresPassword | b64enc | quote }}
  {{- end }}
