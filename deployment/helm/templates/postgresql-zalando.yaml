{{- if .Values.zalandoPostgresql.enabled }}
# Zalando PostgreSQL Operator를 사용하는 PostgreSQL 클러스터
# 사용하려면 먼저 Zalando PostgreSQL Operator가 클러스터에 설치되어 있어야 합니다.
# https://github.com/zalando/postgres-operator
apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: {{ include "investment-auto.fullname" . }}-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "investment-auto.labels" . | nindent 4 }}
spec:
  teamId: {{ .Values.zalandoPostgresql.teamId | quote }}
  numberOfInstances: {{ .Values.zalandoPostgresql.numberOfInstances }}
  volume:
    size: {{ .Values.zalandoPostgresql.volume.size }}
  users:
    {{- range $user, $roles := .Values.zalandoPostgresql.users }}
    {{ $user }}:
      {{- toYaml $roles | nindent 6 }}
    {{- end }}
  databases:
    {{- range $db, $owner := .Values.zalandoPostgresql.databases }}
    {{ $db }}: {{ $owner }}
    {{- end }}
  postgresql:
    version: {{ .Values.zalandoPostgresql.version | quote }}
  resources:
    {{- toYaml .Values.zalandoPostgresql.resources | nindent 4 }}
{{- end }}
