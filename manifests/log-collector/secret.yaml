apiVersion: v1
kind: Secret
metadata:
  name: log-collector-secrets
  namespace: default
  labels:
    app: log-collector
type: Opaque
stringData:
  # GitHub Personal Access Token (repo 범위 필요)
  # 실제 값은 배포 시 아래 명령으로 직접 주입하세요:
  #   kubectl create secret generic log-collector-secrets \
  #     --from-literal=GITHUB_TOKEN=<your-token> \
  #     --from-literal=GITHUB_REPO=<owner/repo> \
  #     -n default
  GITHUB_TOKEN: "REPLACE_ME"
  GITHUB_REPO: "REPLACE_ME"
