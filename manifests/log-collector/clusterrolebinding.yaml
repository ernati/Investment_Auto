apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-collector
  labels:
    app: log-collector
subjects:
  - kind: ServiceAccount
    name: log-collector
    namespace: default
roleRef:
  kind: ClusterRole
  name: log-collector
  apiGroup: rbac.authorization.k8s.io
