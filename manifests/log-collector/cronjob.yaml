apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-collector
  namespace: investment-auto
  labels:
    app: log-collector
spec:
  # 매일 오전 9시 (KST 기준 00:00 UTC)에 실행
  schedule: "0 0 * * *"
  # 동시 실행 방지
  concurrencyPolicy: Forbid
  # 실패한 Job 보관 수
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: log-collector
        spec:
          serviceAccountName: log-collector
          restartPolicy: OnFailure

          # initContainer: git clone + pip install (메인 서비스와 동일한 패턴)
          initContainers:
            - name: git-clone
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  echo "Installing git..."
                  apt-get update && apt-get install -y --no-install-recommends git
                  
                  echo "Cloning repository..."
                  git clone --depth 1 --branch main https://github.com/ernati/Investment_Auto.git /app
                  
                  echo "Installing Python dependencies to /app/libs..."
                  pip install --no-cache-dir --target=/app/libs \
                    PyGitHub>=2.3.0 kubernetes>=29.0.0
                  
                  echo "Initialization complete!"
              volumeMounts:
                - name: app-code
                  mountPath: /app
                - name: pip-cache
                  mountPath: /root/.cache/pip
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

          containers:
            - name: log-collector
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command:
                - python
                - -m
                - Scripts.apps.log_autoissue_runner
              env:
                # Python 패키지 경로 (initContainer에서 /app/libs에 설치)
                - name: PYTHONPATH
                  value: "/app/libs:/app/Scripts"
                # 수집 대상 설정
                - name: LOG_NAMESPACE
                  value: "investment-auto"
                - name: LOG_LABEL_SELECTOR
                  value: "app=investment-auto"
                # Copilot Agent 할당 (선택 사항)
                - name: COPILOT_AGENT_USERNAME
                  value: ""
                # 실행 당 최대 Issue 생성 수
                - name: MAX_ISSUES_PER_RUN
                  value: "5"
                # GitHub 인증 정보 (Secret에서 주입)
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: log-collector-secrets
                      key: GITHUB_TOKEN
                - name: GITHUB_REPO
                  valueFrom:
                    secretKeyRef:
                      name: log-collector-secrets
                      key: GITHUB_REPO
              volumeMounts:
                - name: app-code
                  mountPath: /app
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"

          volumes:
            - name: app-code
              emptyDir: {}
            - name: pip-cache
              emptyDir: {}
