apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-collector
  namespace: investment-auto
  labels:
    app: log-collector
spec:
  # Žß§žĚľ žė§ž†Ą 9žčú (KST Íłįž§Ä 00:00 UTC)žóź žč§ŪĖČ
  schedule: "0 0 * * *"
  # ŽŹôžčú žč§ŪĖČ Žį©žßÄ
  concurrencyPolicy: Forbid
  # žč§ŪĆ®Ūēú Job Ž≥īÍīÄ žąė
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: log-collector
        spec:
          serviceAccountName: log-collector
          restartPolicy: OnFailure

          # initContainer: git clone + pip install (Ž©ĒžĚł žĄúŽĻĄžä§žôÄ ŽŹôžĚľŪēú ŪĆ®ŪĄī)
          initContainers:
            - name: git-clone
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  echo "Installing git..."
                  apt-get update && apt-get install -y --no-install-recommends git
                  
                  echo "Cloning repository..."
                  git clone --depth 1 --branch main https://github.com/ernati/Investment_Auto.git /app
                  
                  echo "Installing Python dependencies to /app/libs..."
                  pip install --no-cache-dir --target=/app/libs -r /app/requirements.txt
                  
                  echo "Initialization complete!"
              volumeMounts:
                - name: app-code
                  mountPath: /app
                - name: pip-cache
                  mountPath: /root/.cache/pip
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

          containers:
            - name: log-collector
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command:
                - python
                - -m
                - Scripts.apps.log_autoissue_runner
              env:
                # Python ŪĆ®Ūā§žßÄ Í≤ĹŽ°ú (initContaineržóźžĄú /app/libsžóź žĄ§žĻė)
                - name: PYTHONPATH
                  value: "/app/libs:/app/Scripts"
                # žąėžßĎ ŽĆÄžÉĀ žĄ§ž†ē
                - name: LOG_NAMESPACE
                  value: "investment-auto"
                - name: LOG_LABEL_SELECTOR
                  value: "app.kubernetes.io/name=investment-auto"
                # Copilot Agent Ūē†ŽčĻ (žĄ†ŪÉĚ žā¨Ūē≠)
                - name: COPILOT_AGENT_USERNAME
                  value: ""
                # žč§ŪĖČ ŽčĻ žĶúŽĆÄ Issue žÉĚžĄĪ žąė
                - name: MAX_ISSUES_PER_RUN
                  value: "5"
                # GitHub žĚłž¶Ě ž†ēŽ≥ī (SecretžóźžĄú ž£ľžěÖ)
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: log-collector-secrets
                      key: GITHUB_TOKEN
                - name: GITHUB_REPO
                  valueFrom:
                    secretKeyRef:
                      name: log-collector-secrets
                      key: GITHUB_REPO
              volumeMounts:
                - name: app-code
                  mountPath: /app
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"

          volumes:
            - name: app-code
              emptyDir: {}
            - name: pip-cache
              emptyDir: {}
